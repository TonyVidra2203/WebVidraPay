<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ВыДрА</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #000000;
            --panel-2: rgba(28, 28, 38, 0.95);
            --text: #f3ead7;
            --muted: #b8ab8b;
            --border: rgba(216, 178, 106, 0.22);
            --danger-bg: rgba(120, 22, 22, 0.22);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #000;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar,
        .page::-webkit-scrollbar,
        .wrap::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        body {
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top, rgba(216, 178, 106, 0.10), transparent 30%),
                linear-gradient(180deg, #000000 0%, #0a0a0d 35%, #111218 100%);
            color: var(--text);
        }

        .page {
            min-height: 100vh;
            padding: 24px 16px 40px;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        .wrap {
            width: 100%;
            max-width: 920px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        .hero-image-wrap {
            display: flex;
            justify-content: center;
        }

        .hero-image {
            width: 100%;
            max-width: 920px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.42);
        }

        .card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            margin-top: 24px;
            box-shadow: var(--shadow);
        }

        h2 {
            margin-top: 0;
            color: #fff3d8;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(216, 178, 106, 0.18);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: rgba(240, 200, 121, 0.65);
            box-shadow: 0 0 0 4px rgba(216, 178, 106, 0.12);
        }

        .hint {
            font-size: 13px;
            color: var(--muted);
        }

        .btn-row {
            margin-top: 20px;
            display: flex;
        }

        .btn {
            min-height: 52px;
            padding: 14px 26px;
            border-radius: 999px;
            background: linear-gradient(135deg, #c79646, #f0c879);
            color: #1a140d;
            border: none;
            font-weight: 900;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
        }

        .err {
            padding: 14px;
            border-radius: 14px;
            background: var(--danger-bg);
            border: 1px solid rgba(255, 143, 143, 0.25);
            color: #ffd2d2;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="wrap">

            <div class="hero-image-wrap">
                <img class="hero-image" src="/static/img/vydra-logo.jpg" alt="ВыДрА">
            </div>

            {% if error %}
                <div class="card">
                    <h2>Ошибка</h2>
                    <div class="err">{{ error }}</div>
                </div>
            {% endif %}

            <div class="card">
                <form method="post" action="/login">
                    <h2>Введите пароль</h2>

                    <div class="field">
                        <input type="password" id="password" name="password" required>
                        <div class="hint">
                            Введите пароль, выданный Telegram-ботом для входа в аккаунт. Он находится в ЛИЧНОМ КАБИНЕТЕ каждого пользователя 
                        </div>
                    </div>

                    <div class="btn-row">
                        <button class="btn" type="submit">Войти</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</body>
</html>
